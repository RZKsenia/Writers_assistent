<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ассистент Писателя</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        serif: ['Cormorant Garamond', 'Georgia', 'serif'],
        sans: ['Inter', 'system-ui', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      },
      colors: {
        parchment: { 50: '#fdf8f0', 100: '#f9f0e0', 200: '#f2e0c0', 300: '#e8cc9a', 400: '#d4a855', 500: '#c49540', 600: '#a87830', 700: '#8a6028', 800: '#6d4d22', 900: '#523a1a' },
        ink: { 50: '#f5f3f0', 100: '#e8e4de', 200: '#d4cec4', 300: '#b8aea0', 400: '#968a7a', 500: '#7a6e60', 600: '#63574c', 700: '#4f453c', 800: '#3d3630', 900: '#2a2420', 950: '#1a1614' },
        sage: { 50: '#f4f7f4', 100: '#e3ebe3', 200: '#c5d6c5', 300: '#9eb89e', 400: '#729672', 500: '#527a52', 600: '#3d603d', 700: '#334d33', 800: '#2b3e2b', 900: '#253425' },
        burgundy: { 50: '#fdf2f2', 100: '#fce7e7', 200: '#f9d0d0', 300: '#f4a9a9', 400: '#ec7373', 500: '#df4b4b', 600: '#cc3333', 700: '#ab2525', 800: '#8d2222', 900: '#762121' }
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; }
  .font-serif { font-family: 'Cormorant Garamond', serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #b8aea0; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #968a7a; }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .slide-in { animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  .modal-overlay { background: rgba(26, 22, 20, 0.6); backdrop-filter: blur(4px); }
  .card-hover { transition: all 0.2s ease; }
  .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
  .tab-active { border-bottom: 2px solid #527a52; color: #334d33; }
  .nav-active { background: rgba(82, 122, 82, 0.1); color: #3d603d; }
  textarea, input, select { font-family: 'Inter', sans-serif; }
  .char-card-gradient { background: linear-gradient(135deg, #f9f0e0 0%, #f2e0c0 100%); }
  .loc-card-gradient { background: linear-gradient(135deg, #e3ebe3 0%, #c5d6c5 100%); }
  .work-card-gradient { background: linear-gradient(135deg, #fce7e7 0%, #f9d0d0 100%); }
  .graph-canvas { background: #faf8f5; border-radius: 12px; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; }
  .stat-card { background: linear-gradient(135deg, #fdf8f0 0%, #f9f0e0 100%); border: 1px solid #e8e4de; }
  .timeline-line { position: relative; }
  .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #d4cec4; }
  .empty-state { text-align: center; padding: 3rem 1rem; }
  .empty-state svg { margin: 0 auto 1rem; opacity: 0.4; }
  .btn-primary { background: linear-gradient(135deg, #527a52, #3d603d); color: white; border: none; padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-primary:hover { background: linear-gradient(135deg, #3d603d, #334d33); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(61,96,61,0.3); }
  .btn-secondary { background: #e8e4de; color: #4f453c; border: none; padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-secondary:hover { background: #d4cec4; }
  .btn-danger { background: #df4b4b; color: white; border: none; padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-danger:hover { background: #cc3333; }
  .btn-ghost { background: transparent; color: #63574c; border: 1px solid #d4cec4; padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-ghost:hover { background: #f5f3f0; border-color: #b8aea0; }
  input[type="file"] { display: none; }
  .image-upload-area { border: 2px dashed #d4cec4; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; }
  .image-upload-area:hover { border-color: #527a52; background: #f4f7f4; }
  .tooltip { position: relative; }
  .tooltip::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #3d3630; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .tooltip:hover::after { opacity: 1; }
  @keyframes pulse-dot { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }
  .pulse-dot { animation: pulse-dot 2s infinite; }
  .writing-prompt { background: linear-gradient(135deg, #f4f7f4, #e3ebe3); border-left: 4px solid #527a52; }
  .word-count-bar { height: 4px; background: #e8e4de; border-radius: 2px; overflow: hidden; }
  .word-count-fill { height: 100%; background: linear-gradient(90deg, #527a52, #729672); border-radius: 2px; transition: width 0.3s; }
  .search-highlight { background: #f9f0e0; border-radius: 2px; padding: 0 2px; }
</style>
</head>
<body class="bg-ink-50 text-ink-800 min-h-screen">

<div id="app" class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-ink-900 text-ink-200 flex flex-col flex-shrink-0 transition-all duration-300">
    <div class="p-5 border-b border-ink-700">
      <h1 class="font-serif text-2xl text-parchment-200 font-bold tracking-wide">✦ Ассистент<br><span class="text-lg text-ink-400">Писателя</span></h1>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <button onclick="showSection('dashboard')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-ink-800 transition-colors" data-section="dashboard">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
        <span class="text-sm">Обзор</span>
      </button>
      <button onclick="showSection('works')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-ink-800 transition-colors" data-section="works">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        <span class="text-sm">Произведения</span>
      </button>
      <button onclick="showSection('characters')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-ink-800 transition-colors" data-section="characters">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-sm">Персонажи</span>
      </button>
      <button onclick="showSection('locations')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-ink-800 transition-colors" data-section="locations">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span class="text-sm">Места</span>
      </button>
      <button onclick="showSection('planner')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-ink-800 transition-colors" data-section="planner">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
        <span class="text-sm">Планировщик</span>
      </button>
      <button onclick="showSection('relationships')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-ink-800 transition-colors" data-section="relationships">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        <span class="text-sm">Связи</span>
      </button>
      <div class="border-t border-ink-700 my-3"></div>
      <button onclick="showSection('tools')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-ink-800 transition-colors" data-section="tools">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        <span class="text-sm">Инструменты</span>
      </button>
    </nav>
    <div class="p-3 border-t border-ink-700 space-y-1">
      <button onclick="saveProject()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left hover:bg-ink-800 transition-colors text-sage-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
        <span class="text-sm">Сохранить</span>
      </button>
      <button onclick="loadProject()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left hover:bg-ink-800 transition-colors text-parchment-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3"/></svg>
        <span class="text-sm">Загрузить</span>
      </button>
      <button onclick="exportProject()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left hover:bg-ink-800 transition-colors text-ink-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span class="text-sm">Экспорт JSON</span>
      </button>
      <label class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left hover:bg-ink-800 transition-colors text-ink-400 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        <span class="text-sm">Импорт JSON</span>
        <input type="file" accept=".json" onchange="importProject(event)">
      </label>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Bar -->
    <header class="bg-white border-b border-ink-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-4">
        <h2 id="sectionTitle" class="font-serif text-2xl text-ink-800 font-semibold">Обзор</h2>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="globalSearch" type="text" placeholder="Поиск..." oninput="handleGlobalSearch(this.value)" class="pl-10 pr-4 py-2 bg-ink-50 border border-ink-200 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-sage-400 focus:border-transparent">
        </div>
        <span id="lastSaved" class="text-xs text-ink-400"></span>
      </div>
    </header>

    <!-- Content Area -->
    <div id="contentArea" class="flex-1 overflow-y-auto p-6">
      <!-- Sections will be rendered here -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-50 hidden">
  <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
  <div class="relative z-10 flex items-center justify-center min-h-screen p-4">
    <div id="modalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto fade-in">
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
  <div class="bg-ink-800 text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 fade-in">
    <svg class="w-5 h-5 text-sage-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    <span id="toastText" class="text-sm"></span>
  </div>
</div>

<script>
// ============ DATA ============
let data = {
  works: [],
  characters: [],
  locations: [],
  relationships: [],
  prompts: []
};

let currentSection = 'dashboard';
let editingId = null;

const RELATIONSHIP_TYPES = [
  { id: 'friend', label: 'Друг', color: '#527a52', icon: '🤝' },
  { id: 'enemy', label: 'Враг', color: '#ab2525', icon: '⚔️' },
  { id: 'family', label: 'Семья', color: '#8a6028', icon: '👨‍👩‍👧' },
  { id: 'love', label: 'Возлюбленные', color: '#df4b4b', icon: '❤️' },
  { id: 'mentor', label: 'Наставник', color: '#63574c', icon: '🎓' },
  { id: 'rival', label: 'Соперник', color: '#968a7a', icon: '🏆' },
  { id: 'colleague', label: 'Коллега', color: '#5b7fa5', icon: '💼' },
  { id: 'acquaintance', label: 'Знакомый', color: '#b8aea0', icon: '👋' },
  { id: 'secret', label: 'Тайная связь', color: '#6b21a8', icon: '🤫' },
  { id: 'custom', label: 'Другое', color: '#7a6e60', icon: '✏️' }
];

const GENRES = ['Фэнтези', 'Научная фантастика', 'Детектив', 'Роман', 'Триллер', 'Ужасы', 'Исторический', 'Приключения', 'Драма', 'Комедия', 'Поэзия', 'Другое'];

const WRITING_PROMPTS = [
  "Персонаж находит в старом пальто записку, написанную его почерком, но он её не писал...",
  "Два незнакомца оказываются заперты в комнате. У каждого из них — половина одного и того же ключа.",
  "Город просыпается и обнаруживает, что все зеркала показывают не отражение, а воспоминания.",
  "Персонаж получает письмо от человека, который умер двадцать лет назад.",
  "На рассвете все жители города одновременно слышат один и тот же звук.",
  "Библиотекарь находит книгу, в которой описана его жизнь — включая события, которые ещё не произошли.",
  "Персонаж понимает, что каждое его решение создаёт параллельную реальность, и кто-то пытается их объединить.",
  "В ресторане официант приносит блюдо, которое персонаж ел только в детстве — и больше нигде.",
  "Часы в городе начинают идти назад, и только один человек это замечает.",
  "Персонаж встречает свою точную копию, но у неё другая судьба.",
  "Старый мост в городе начинает шептать имена тех, кто по нему проходит.",
  "Персонаж обнаруживает, что его сны — это чужие воспоминания."
];

// ============ NAVIGATION ============
function showSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('nav-active', el.dataset.section === section);
  });
  const titles = {
    dashboard: 'Обзор', works: 'Произведения', characters: 'Персонажи',
    locations: 'Места действия', planner: 'Планировщик глав',
    relationships: 'Граф связей', tools: 'Инструменты писателя'
  };
  document.getElementById('sectionTitle').textContent = titles[section] || '';
  renderSection();
}

function renderSection() {
  const area = document.getElementById('contentArea');
  switch (currentSection) {
    case 'dashboard': renderDashboard(area); break;
    case 'works': renderWorks(area); break;
    case 'characters': renderCharacters(area); break;
    case 'locations': renderLocations(area); break;
    case 'planner': renderPlanner(area); break;
    case 'relationships': renderRelationships(area); break;
    case 'tools': renderTools(area); break;
  }
}

// ============ DASHBOARD ============
function renderDashboard(area) {
  const totalWords = countTotalWords();
  const wordGoal = 50000;
  const progress = Math.min((totalWords / wordGoal) * 100, 100);
  const prompt = WRITING_PROMPTS[Math.floor(Math.random() * WRITING_PROMPTS.length)];

  area.innerHTML = `
    <div class="fade-in space-y-6 max-w-6xl mx-auto">
      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="stat-card rounded-xl p-5 card-hover">
          <div class="text-3xl font-bold text-ink-800">${data.works.length}</div>
          <div class="text-sm text-ink-500 mt-1">Произведений</div>
        </div>
        <div class="stat-card rounded-xl p-5 card-hover">
          <div class="text-3xl font-bold text-ink-800">${data.characters.length}</div>
          <div class="text-sm text-ink-500 mt-1">Персонажей</div>
        </div>
        <div class="stat-card rounded-xl p-5 card-hover">
          <div class="text-3xl font-bold text-ink-800">${data.locations.length}</div>
          <div class="text-sm text-ink-500 mt-1">Мест действия</div>
        </div>
        <div class="stat-card rounded-xl p-5 card-hover">
          <div class="text-3xl font-bold text-ink-800">${totalWords.toLocaleString()}</div>
          <div class="text-sm text-ink-500 mt-1">Слов всего</div>
        </div>
      </div>

      <!-- Word Count Goal -->
      <div class="bg-white rounded-xl p-5 border border-ink-200">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-serif text-lg font-semibold">Прогресс к цели (${wordGoal.toLocaleString()} слов)</h3>
          <span class="text-sm text-sage-600 font-medium">${progress.toFixed(1)}%</span>
        </div>
        <div class="word-count-bar">
          <div class="word-count-fill" style="width: ${progress}%"></div>
        </div>
        <div class="flex justify-between mt-2 text-xs text-ink-400">
          <span>0</span>
          <span>${(wordGoal/2).toLocaleString()}</span>
          <span>${wordGoal.toLocaleString()}</span>
        </div>
      </div>

      <!-- Writing Prompt -->
      <div class="writing-prompt rounded-xl p-6">
        <div class="flex items-start gap-3">
          <span class="text-2xl">💡</span>
          <div>
            <h3 class="font-serif text-lg font-semibold text-sage-700 mb-2">Подсказка для вдохновения</h3>
            <p class="text-ink-700 italic">${prompt}</p>

function refreshPrompt() {

function countTotalWords() {
  let count = 0;
  data.characters.forEach(c => { count += countWords(c.description || ''); count += countWords(c.appearance || ''); });
  data.locations.forEach(l => { count += countWords(l.description || ''); });
  data.works.forEach(w => {
    count += countWords(w.description || '');
    (w.chapters || []).forEach(ch => { count += countWords(ch.description || ''); count += countWords(ch.notes || ''); });
  });
  data.relationships.forEach(r => { count += countWords(r.description || ''); });
  return count;
}

function countWords(text) {
  return text.trim() ? text.trim().split(/\s+/).length : 0;
}

function getStatusBadge(status) {
  const map = { draft: 'bg-ink-100 text-ink-600', writing: 'bg-sage-100 text-sage-700', editing: 'bg-parchment-100 text-parchment-700', done: 'bg-blue-100 text-blue-700' };
  return map[status] || 'bg-ink-100 text-ink-600';
}

function getStatusText(status) {
  const map = { draft: 'Черновик', writing: 'В процессе', editing: 'Редактирование', done: 'Завершено' };
  return map[status] || 'Черновик';
}

function saveWork() {
  const title = document.getElementById('workTitle').value.trim();
  if (!title) { showToast('Введите название'); return; }

  const workData = {
    title,
    genre: document.getElementById('workGenre').value,
    status: document.getElementById('workStatus').value,
    description: document.getElementById('workDesc').value.trim()
  };

  if (editingId) {
    const work = data.works.find(w => w.id === editingId);
    Object.assign(work, workData);
  } else {
    data.works.push({ id: genId(), ...workData, chapters: [], createdAt: new Date().toISOString() });
  }

  closeModal();
  renderSection();
  showToast(editingId ? 'Произведение обновлено' : 'Произведение создано');
}

function deleteWork(id) {
  if (!confirm('Удалить произведение и все его главы?')) return;
  data.works = data.works.filter(w => w.id !== id);
  closeModal();
  renderSection();
  showToast('Произведение удалено');
}

    data.characters.push({ id: genId(), ...chData, createdAt: new Date().toISOString() });

function deleteChar(id) {
  if (!confirm('Удалить персонажа? Связи также будут удалены.')) return;

function saveChapter(workId) {
  const title = document.getElementById('chTitle').value.trim();
  if (!title) { showToast('Введите название'); return; }

  const work = data.works.find(w => w.id === workId);
  if (!work) return;
  if (!work.chapters) work.chapters = [];

  const charIds = Array.from(document.querySelectorAll('.char-checkbox:checked')).map(cb => cb.value);
  const chData = {
    title,
    order: parseInt(document.getElementById('chOrder').value) || 1,
    pov: document.getElementById('chPov').value.trim(),
    description: document.getElementById('chDesc').value.trim(),
    characterIds: charIds,
    locationId: document.getElementById('chLocation').value,
    notes: document.getElementById('chNotes').value.trim()
  };

  if (editingId) {
    const ch = work.chapters.find(c => c.id === editingId);
    Object.assign(ch, chData);
  } else {
    work.chapters.push({ id: genId(), ...chData });
  }

  closeModal();
  renderPlannerChapters();
  showToast(editingId ? 'Глава обновлена' : 'Глава создана');
}

function deleteChapter(workId, chId) {
  if (!confirm('Удалить эту главу?')) return;
  const work = data.works.find(w => w.id === workId);
  if (work) {
    work.chapters = (work.chapters || []).filter(c => c.id !== chId);
  }
  renderPlannerChapters();
  showToast('Глава удалена');
}

function moveChapter(workId, chId, dir) {
  const work = data.works.find(w => w.id === workId);
  if (!work) return;
  const chapters = (work.chapters || []).sort((a, b) => (a.order || 0) - (b.order || 0));
  const idx = chapters.findIndex(c => c.id === chId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= chapters.length) return;

  // Swap orders
  const temp = chapters[idx].order;
  chapters[idx].order = chapters[newIdx].order;
  chapters[newIdx].order = temp;
  renderPlannerChapters();
}

function drawGraph() {
  const canvas = document.getElementById('graphCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 32;
  canvas.height = 500;

  const chars = data.characters;
  const rels = data.relationships;

  // Position characters in a circle
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = Math.min(cx, cy) - 60;
  const positions = {};

  chars.forEach((ch, i) => {
    const angle = (2 * Math.PI * i) / chars.length - Math.PI / 2;
    positions[ch.id] = {
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle)
    };
  });

  // Draw edges
  rels.forEach(r => {
    const p1 = positions[r.characterId1];
    const p2 = positions[r.characterId2];
    if (!p1 || !p2) return;

    const rType = RELATIONSHIP_TYPES.find(t => t.id === r.type);
    const color = rType?.color || '#7a6e60';

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label on edge
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    ctx.fillStyle = '#fff';
    const tw = ctx.measureText(rType?.label || '').width;
    ctx.fillRect(mx - tw/2 - 4, my - 8, tw + 8, 16);
    ctx.fillStyle = color;
    ctx.font = '11px Inter';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(rType?.label || r.customType || '', mx, my);
  });

  // Draw nodes
  chars.forEach(ch => {
    const pos = positions[ch.id];
    if (!pos) return;

    // Shadow
    ctx.beginPath();
    ctx.arc(pos.x, pos.y + 2, 24, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fill();

    // Circle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 24, 0, 2 * Math.PI);
    const grad = ctx.createRadialGradient(pos.x - 5, pos.y - 5, 0, pos.x, pos.y, 24);
    grad.addColorStop(0, '#f9f0e0');
    grad.addColorStop(1, '#e8cc9a');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#c49540';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Name
    ctx.fillStyle = '#2a2420';
    ctx.font = 'bold 13px Cormorant Garamond';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const name = ch.name.length > 10 ? ch.name.substring(0, 9) + '…' : ch.name;
    ctx.fillText(name, pos.x, pos.y + 38);
  });
}

              <option value="">Выберите</option>
              ${data.characters.map(c => `<option value="${c.id}" ${rel && rel.characterId2 === c.id ? 'selected' : ''}>${escHtml(c.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-ink-600 mb-1">Тип связи</label>
          <div class="grid grid-cols-2 gap-2">
            ${RELATIONSHIP_TYPES.map(t => `
              <label class="flex items-center gap-2 p-2.5 border rounded-lg cursor-pointer transition-colors hover:bg-ink-50 ${rel && rel.type === t.id ? 'border-sage-400 bg-sage-50' : 'border-ink-200'}">
                <input type="radio" name="relType" value="${t.id}" class="text-sage-600 focus:ring-sage-400" ${rel && rel.type === t.id ? 'checked' : ''}>
                <span class="text-lg">${t.icon}</span>
                <span class="text-sm">${t.label}</span>
              </label>
            `).join('')}
          </div>
        </div>
        <div id="relCustomTypeArea" class="hidden">
          <label class="block text-sm font-medium text-ink-600 mb-1">Укажите тип</label>
          <input id="relCustomType" type="text" value="${rel && rel.type === 'custom' ? escAttr(rel.customType || '') : ''}" class="w-full px-4 py-2.5 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sage-400" placeholder="Ваш тип связи">
        </div>
        <div>
          <label class="block text-sm font-medium text-ink-600 mb-1">Описание связи</label>
          <textarea id="relDesc" rows="3" class="w-full px-4 py-2.5 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sage-400 resize-none" placeholder="Опишите характер взаимоотношений...">${rel ? escHtml(rel.description || '') : ''}</textarea>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-ink-100">
        <button onclick="closeModal()" class="btn-ghost">Отмена</button>
        <button onclick="saveRel()" class="btn-primary">Сохранить</button>
      </div>
    </div>
  `;
  openModal();

  // Toggle custom type area
  document.querySelectorAll('input[name="relType"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.getElementById('relCustomTypeArea').classList.toggle('hidden', this.value !== 'custom');
    });
  });
}

function saveRel() {
  const c1 = document.getElementById('relChar1').value;
  const c2 = document.getElementById('relChar2').value;
  if (!c1 || !c2) { showToast('Выберите обоих персонажей'); return; }
  if (c1 === c2) { showToast('Выберите разных персонажей'); return; }

  const typeRadio = document.querySelector('input[name="relType"]:checked');
  const type = typeRadio ? typeRadio.value : '';

  const relData = {
    characterId1: c1,
    characterId2: c2,
    type,
    customType: type === 'custom' ? document.getElementById('relCustomType').value.trim() : '',
    description: document.getElementById('relDesc').value.trim()
  };

  if (editingId) {
    const rel = data.relationships.find(r => r.id === editingId);
    Object.assign(rel, relData);
  } else {
    data.relationships.push({ id: genId(), ...relData });
  }

  closeModal();
  renderSection();
  showToast(editingId ? 'Связь обновлена' : 'Связь создана');
}

function deleteRel(id) {
  if (!confirm('Удалить эту связь?')) return;
  data.relationships = data.relationships.filter(r => r.id !== id);
  renderSection();
  showToast('Связь удалена');
}

// ============ TOOLS ============
function renderTools(area) {
  area.innerHTML = `
    <div class="fade-in max-w-4xl mx-auto space-y-6">
      <!-- Word Counter -->
      <div class="bg-white rounded-xl border border-ink-200 p-6">
        <h3 class="font-serif text-xl font-semibold mb-4">📝 Счётчик слов</h3>
        <textarea id="wordCounterInput" rows="6" class="w-full px-4 py-3 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sage-400 resize-none font-mono text-sm" placeholder="Вставьте или напишите текст..." oninput="updateWordCounter()"></textarea>
        <div class="flex flex-wrap gap-4 mt-3 text-sm">
          <div class="stat-card rounded-lg px-4 py-2">
            <span class="font-bold text-lg" id="wcWords">0</span> <span class="text-ink-500">слов</span>
          </div>
          <div class="stat-card rounded-lg px-4 py-2">
            <span class="font-bold text-lg" id="wcChars">0</span> <span class="text-ink-500">символов</span>
          </div>
          <div class="stat-card rounded-lg px-4 py-2">
            <span class="font-bold text-lg" id="wcCharsNS">0</span> <span class="text-ink-500">без пробелов</span>
          </div>
          <div class="stat-card rounded-lg px-4 py-2">
            <span class="font-bold text-lg" id="wcSentences">0</span> <span class="text-ink-500">предложений</span>
          </div>
          <div class="stat-card rounded-lg px-4 py-2">
            <span class="font-bold text-lg" id="wcPages">0</span> <span class="text-ink-500">стр. (40k знаков)</span>
          </div>
        </div>
      </div>

      <!-- Name Generator -->
      <div class="bg-white rounded-xl border border-ink-200 p-6">
        <h3 class="font-serif text-xl font-semibold mb-4">🎭 Генератор имён</h3>
        <div class="flex gap-3 mb-4">
          <select id="nameGender" class="px-4 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sage-400">
            <option value="any">Любой</option>
            <option value="male">Мужское</option>
            <option value="female">Женское</option>
          </select>
          <select id="nameStyle" class="px-4 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sage-400">
            <option value="russian">Русские</option>
            <option value="european">Европейские</option>
            <option value="fantasy">Фэнтези</option>
          </select>
          <button onclick="generateNames()" class="btn-primary">Сгенерировать</button>
        </div>
        <div id="nameResults" class="flex flex-wrap gap-2">
          <span class="text-sm text-ink-400">Нажмите кнопку для генерации</span>
        </div>
      </div>

      <!-- Writing Prompts -->
      <div class="bg-white rounded-xl border border-ink-200 p-6">
        <h3 class="font-serif text-xl font-semibold mb-4">💡 Генератор подсказок</h3>
        <div id="toolPrompt" class="writing-prompt rounded-lg p-5 mb-4">
          <p class="text-ink-700 italic">${WRITING_PROMPTS[Math.floor(Math.random() * WRITING_PROMPTS.length)]}</p>
        </div>
        <button onclick="generateToolPrompt()" class="btn-primary">Другая подсказка</button>
      </div>

      <!-- Character Randomizer -->
      <div class="bg-white rounded-xl border border-ink-200 p-6">
        <h3 class="font-serif text-xl font-semibold mb-4">🎲 Случайная комбинация</h3>
        <p class="text-sm text-ink-500 mb-4">Генерирует случайную комбинацию персонажа, места и ситуации для вдохновения</p>
        <div id="randomCombo" class="space-y-3 mb-4"></div>
        <button onclick="generateRandomCombo()" class="btn-primary">Сгенерировать</button>
      </div>
    </div>
  `;
}

function updateWordCounter() {
  const text = document.getElementById('wordCounterInput').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  const charsNS = text.replace(/\s/g, '').length;
  const sentences = text.split(/[.!?]+/).filter(s => s.trim()).length;
  const pages = (chars / 40000).toFixed(2);

  document.getElementById('wcWords').textContent = words.toLocaleString();
  document.getElementById('wcChars').textContent = chars.toLocaleString();
  document.getElementById('wcCharsNS').textContent = charsNS.toLocaleString();
  document.getElementById('wcSentences').textContent = sentences;
  document.getElementById('wcPages').textContent = pages;
}

function generateNames() {
  const gender = document.getElementById('nameGender').value;
  const style = document.getElementById('nameStyle').value;

  const names = {
    russian: {
      male: ['Александр', 'Дмитрий', 'Максим', 'Артём', 'Иван', 'Михаил', 'Даниил', 'Никита', 'Егор', 'Андрей', 'Кирилл', 'Фёдор', 'Владимир', 'Борис', 'Степан'],
      female: ['Анна', 'Мария', 'Елена', 'Ольга', 'Наталья', 'Екатерина', 'Татьяна', 'Ирина', 'Светлана', 'Виктория', 'Алиса', 'Полина', 'Софья', 'Варвара', 'Дарья']
    },
    european: {
      male: ['Oliver', 'Arthur', 'Felix', 'Leo', 'Hugo', 'Theodore', 'Jasper', 'Sebastian', 'Adrian', 'Julian', 'Edgar', 'Vincent', 'Raphael', 'Silas', 'Miles'],
      female: ['Eleanor', 'Clara', 'Iris', 'Violet', 'Genevieve', 'Rosalind', 'Cordelia', 'Beatrice', 'Margaret', 'Josephine', 'Cecilia', 'Evangeline', 'Isolde', 'Ophelia', 'Seraphina']
    },
    fantasy: {
      male: ['Аэриан', 'Торион', 'Зарэль', 'Кайден', 'Элдар', 'Фенрир', 'Драко', 'Талон', 'Азраэль', 'Мордред', 'Тандрил', 'Ворион', 'Галадрион', 'Сильвер', 'Тёмный Странник'],
      female: ['Элара', 'Изольда', 'Серафина', 'Лириэль', 'Аврора', 'Мирабель', 'Талисса', 'Нимфея', 'Аэлин', 'Кассандра', 'Эвелина', 'Веспер', 'Люциана', 'Селестия', 'Астрид']
    }
  };

  let pool = [];
  if (gender === 'any') {
    pool = [...names[style].male, ...names[style].female];
  } else {
    pool = names[style][gender];
  }

  const results = [];
  while (results.length < 5) {
    const name = pool[Math.floor(Math.random() * pool.length)];
    if (!results.includes(name)) results.push(name);
  }

  document.getElementById('nameResults').innerHTML = results.map(n => `
    <button onclick="navigator.clipboard.writeText('${n}'); showToast('Скопировано')" class="px-4 py-2 bg-sage-50 text-sage-700 rounded-lg text-sm font-medium hover:bg-sage-100 transition-colors cursor-pointer">${n}</button>
  `).join('');
}

function generateToolPrompt() {
  const prompt = WRITING_PROMPTS[Math.floor(Math.random() * WRITING_PROMPTS.length)];
  document.getElementById('toolPrompt').innerHTML = `<p class="text-ink-700 italic fade-in">${prompt}</p>`;
}

function generateRandomCombo() {
  if (data.characters.length === 0 || data.locations.length === 0) {
    document.getElementById('randomCombo').innerHTML = '<p class="text-sm text-ink-400">Создайте персонажей и места для генерации</p>';
    return;
  }

  const char = data.characters[Math.floor(Math.random() * data.characters.length)];
  const loc = data.locations[Math.floor(Math.random() * data.locations.length)];
  const situations = [
    'встречает неожиданного гостя',
    'обнаруживает тайну',
    'принимает невозможное решение',
    'теряет что-то важное',
    'сталкивается с предательством',
    'находит старый артефакт',
    'получает загадочное послание',
    'попадает в ловушку',
    'вспоминает забытое прошлое',
    'завязывает неожиданный союз',
    'теряет рассудок',
    'спасает незнакомца'
  ];
  const situation = situations[Math.floor(Math.random() * situations.length)];

  document.getElementById('randomCombo').innerHTML = `
    <div class="flex items-center gap-3 p-3 bg-parchment-50 rounded-lg fade-in">
      <span class="text-2xl">👤</span>
      <span class="font-medium">${escHtml(char.name)}</span>
    </div>
    <div class="text-center text-ink-400 fade-in">${situation}</div>
    <div class="flex items-center gap-3 p-3 bg-sage-50 rounded-lg fade-in">
      <span class="text-2xl">📍</span>
      <span class="font-medium">${escHtml(loc.name)}</span>
    </div>
  `;
}

// ============ SEARCH ============
function handleGlobalSearch(query) {
  if (!query.trim()) {
    renderSection();
    return;
  }

  const q = query.toLowerCase();
  const results = [];

  data.works.forEach(w => {
    if (w.title.toLowerCase().includes(q) || (w.description || '').toLowerCase().includes(q)) {
      results.push({ type: 'Произведение', name: w.title, section: 'works', id: w.id });
    }
  });

  data.characters.forEach(c => {
    if (c.name.toLowerCase().includes(q) || (c.description || '').toLowerCase().includes(q) || (c.appearance || '').toLowerCase().includes(q)) {
      results.push({ type: 'Персонаж', name: c.name, section: 'characters', id: c.id });
    }
  });

  data.locations.forEach(l => {
    if (l.name.toLowerCase().includes(q) || (l.description || '').toLowerCase().includes(q)) {
      results.push({ type: 'Место', name: l.name, section: 'locations', id: l.id });
    }
  });

  const area = document.getElementById('contentArea');
  if (results.length === 0) {
    area.innerHTML = `<div class="fade-in empty-state"><p class="text-ink-400">Ничего не найдено по запросу "${escHtml(query)}"</p></div>`;
  } else {
    area.innerHTML = `
      <div class="fade-in max-w-2xl mx-auto">
        <p class="text-sm text-ink-500 mb-4">Найдено: ${results.length} результатов</p>
        <div class="space-y-2">
          ${results.map(r => `
            <div class="bg-white rounded-lg border border-ink-200 p-4 flex items-center justify-between cursor-pointer hover:bg-ink-50 transition-colors" onclick="goToResult('${r.section}', '${r.id}')">
              <div>
                <span class="badge bg-ink-100 text-ink-600">${r.type}</span>
                <span class="font-medium text-ink-800 ml-2">${escHtml(r.name)}</span>
              </div>
              <svg class="w-4 h-4 text-ink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
}

function goToResult(section, id) {
  document.getElementById('globalSearch').value = '';
  showSection(section);
  if (section === 'works') openWorkModal(id);
  else if (section === 'characters') openCharModal(id);
  else if (section === 'locations') openLocModal(id);
}

// ============ SAVE/LOAD ============
function saveProject() {
  localStorage.setItem('writerAssistant', JSON.stringify(data));
  document.getElementById('lastSaved').textContent = 'Сохранено: ' + new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  showToast('Проект сохранён');
}

function loadProject() {
  const saved = localStorage.getItem('writerAssistant');
  if (saved) {
    try {
      data = JSON.parse(saved);
      renderSection();
      showToast('Проект загружен');
    } catch (e) {
      showToast('Ошибка загрузки');
    }
  } else {
    showToast('Нет сохранённых данных');
  }
}

function exportProject() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'writer-assistant-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Проект экспортирован');
}

function importProject(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      data = JSON.parse(e.target.result);
      renderSection();
      showToast('Проект импортирован');
    } catch (err) {
      showToast('Ошибка импорта');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============ UTILS ============
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 2500);
}

function openModal() {
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow = '';
  editingId = null;
}

function handleImageUpload(input, areaId) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const area = document.getElementById(areaId);
    area.innerHTML = `<img src="${e.target.result}" class="w-full h-48 object-cover rounded-lg">`;
  };
  reader.readAsDataURL(file);
}

// ============ INIT ============
// Auto-load from localStorage
const saved = localStorage.getItem('writerAssistant');
if (saved) {
  try { data = JSON.parse(saved); } catch (e) {}
}

showSection('dashboard');

// Auto-save every 30 seconds
setInterval(() => {
  localStorage.setItem('writerAssistant', JSON.stringify(data));
  document.getElementById('lastSaved').textContent = 'Автосохранение: ' + new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}, 30000);

// Handle keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveProject();
  }
});
</script>
